<html lang="en">
<head>
      <meta charset="UTF-8">
      <title>Wordle Game</title>
      <link rel="stylesheet" href="style.css">
      <style>
            * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
}

body {
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
}

#game-container {
      position: relative; /* 1. Изменили на relative */
      top: 0; /* 2. Сбросили позиционирование */
      left: 0;
      transform: none;
      flex-wrap: wrap;
      display: flex; /* 3. Включили Flexbox */
      flex-direction: column; /* 4. Указали, что элементы идут сверху вниз */
      min-height: 100vh; /* 5. Заставляем контейнер занимать минимум всю высоту окна */
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
}
#setup-form {
      display: block;
      margin-bottom: 20px;
}

#setup-form label {
      font-weight: bold;
      color: inherit;
      margin-right: 10px;
}

#setup-form input {
      padding: 10px;
      font-size: 16px;
      outline: none;
      border: none;
      background-color: transparent;
      color: currentColor;
      border-bottom: 2px solid currentColor;
      width: 100%;
      text-align: center;
}

#setup-form button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: var(--primary-color);
      color: var(--secondary-color);
      border: none;
      cursor: pointer;
      transition: background-color 0.3s ease-in-out;
}

#setup-form button:hover {
      background-color: var(--primary-hover-color);
}

h1 {
      font-size: 3em;
      letter-spacing: 2px;
      margin-bottom: 20px;
}
h3 {
      font-size: 3em;
      color: rgba(0, 0, 0, 0);
}

.grid-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
}

.tile {
      width: 50px;
      height: 50px;
      display: inline-block;
      visibility: visible;
      font-size: 24px;
      line-height: 50px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease-in-out;
      border-radius: 5px;
      box-shadow: inset 0 0 0 rgba(0, 0, 0, 0.5);
      color: var(color);
}

.tile.gray {
      background-color: #787c7e;
}

.tile.yellow {
      background-color: #c9b458;
}

.tile.green {
      background-color: #6aaa64;
}
.tile.active {
    box-shadow: 0 0 0 3px #4a90e2; /* Яркая рамка */
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: scale(0.8);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}
/* --- ДОБАВЬ ЭТО В CSS --- */
#grid.animate-tiles .tile.green {
    animation: colorizeGreen 0.5s ease-in forwards;
}
#grid.animate-tiles .tile.yellow {
    animation: colorizeYellow 0.5s ease-in forwards;
}
#grid.animate-tiles .tile.gray {
    animation: colorizeGray 0.5s ease-in forwards;
}

/* Сами кадры анимации остаются те же */
@keyframes colorizeGreen {
  0% { background-color: rgba(0, 0, 0, 0); box-shadow: inset 0 0 0 rgba(0, 0, 0, 0.5); }
  100% { background-color: #6aaa64; box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5); }
}
@keyframes colorizeYellow {
  0% { background-color: rgba(0, 0, 0, 0); box-shadow: inset 0 0 0 rgba(255, 255, 255, 0.5); }
  100% { background-color: #c9b458; box-shadow: inset 0 0 5px rgba(255, 255, 255, 0.3); }
}
@keyframes colorizeGray {
  0% { background-color: rgba(0, 0, 0, 0); box-shadow: inset 0 0 0 rgba(255, 255, 255, 0.3); }
  100% { background-color: #787c7e; box-shadow: inset 0 0 4px rgba(255, 255, 255, 0.2); }
}

/* Анимация активной плитки */
.tile.active {
  animation: pulse 1s infinite ease-in-out;
  box-shadow: 0 0 0 3px #4a90e2;
}

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.05);
  }
}
input {
      margin-top: 20px;
      padding: 10px;
      font-size: 16px;
      outline: none;
      border: none;
      background-color: transparent;
      color: currentColor;
      border-bottom: 2px solid currentColor;
      width: calc(100% - 20px);
      text-align: center;
}

button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: var(--primary-color);
      color: var(--secondary-color);
      border: none;
      cursor: pointer;
      transition: background-color 0.3s ease-in-out;
}

button:hover {
      background-color: var(--primary-hover-color);
}
#start-game-btn,
#settings-btn,
#label {
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
}

#message {
      font-size: 18px;
      color: var(--info-color);
      text-align: center;
}
#label {
      font-size: 18px;
      color: var(color);
      text-align: center;
}

/* ----------- ТЕМНАЯ ТЕМА (начальная) ---------- */
.dark-mode {
      --primary-color: #1a8cf8;
      --primary-hover-color: #1572df;
      --secondary-color: white;
      --background-color: #121213;
      --tile-gray: #787c7e;
      --tile-yellow: #c9b458;
      --tile-green: #6aaa64;
      --info-color: #ffcc00;
      color: white;
      background-color: #121213;
}

/* ----------- СВЕТЛАЯ ТЕМА ---------- */
.light-mode {
      --primary-color: #007bff;
      --primary-hover-color: #0069d9;
      --secondary-color: black;
      --background-color: #f8f9fa;
      --tile-gray: #ced4da;
      --tile-yellow: #ffea00;
      --tile-green: #28a745;
      --info-color: #212529;
      color: black;
      background-color: #f8f9fa;
}

/* Применяется общая тема к каждому элементу */
body.dark-mode,
body.light-mode {
      background-color: var(--background-color);
      color: var(--secondary-color);
}

body.dark-mode #setup-form input,
body.light-mode #setup-form input {
      color: var(--secondary-color);
      border-bottom-color: var(--secondary-color);
}

body.dark-mode button,
body.light-mode button {
      background-color: var(--primary-color);
      color: var(--secondary-color);
}

body.dark-mode button:hover,
body.light-mode button:hover {
      background-color: var(--primary-hover-color);
}

body.dark-mode .tile.gray,
body.light-mode .tile.gray {
      background-color: var(--tile-gray);
}

body.dark-mode .tile.yellow,
body.light-mode .tile.yellow {
      background-color: var(--tile-yellow);
}

body.dark-mode .tile.green,
body.light-mode .tile.green {
      background-color: var(--tile-green);
}

body.dark-mode #message,
body.light-mode #message {
      color: var(--info-color);
}
.hidden {
      display: none;
}

/* Лёгкое затемнение фона страницы */
#modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 999;
      display: none;
}

/* Контейнер самого модального окна */
#settings-dialog {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: var(--background-color);
      padding: 20px;
      border-radius: 10px;
      z-index: 1000;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
      display: none;
}

/* Кнопка закрытия модального окна */
#close-button {
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
}

#settings-dialog h2 {
      margin-bottom: 10px;
}

#settings-dialog label {
      display: block;
      margin-bottom: 10px;
}

#settings-dialog button {
      margin-top: 10px;
}
/* Основные стили для клавиатуры */
#keyboard {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: stretch;
    gap: 10px;
    margin-top: 20px;
}
 #keyboard button {
    transition: background-color 0.3s ease, box-shadow 0.3s ease; /* Плавная смена цвета и тени */
}

.row {
    display: flex;
    justify-content: center;
    gap: 10px;
}

button[data-key] {
    padding: 10px;
    font-size: 16px;
    border: none;
    border-radius: 5px;
    background-color: var(--background-color);
    color: var(--secondary-color);
    cursor: pointer;
    transition: background-color 0.3s ease-in-out;
}

button[data-key]:hover {
    background-color: var(--primary-color);
}

.delete-button, .enter-button {
    background-color: var(--primary-color);
    color: var(--secondary-color);
}

.delete-button:hover, .enter-button:hover {
    background-color: var(--primary-hover-color);
}

/* --- НОВЫЕ СТИЛИ ДЛЯ КЛАВИАТУРЫ --- */
.keyboard-tile.gray {
    background-color: #787c7e !important; /* Важно использовать !important, чтобы перебить другие стили */
    color: white;
}

.keyboard-tile.yellow {
    background-color: #c9b458 !important;
    color: black;
}

.keyboard-tile.green {
    background-color: #6aaa64 !important;
    color: white;
}

/* Серый цвет для букв, отсутствующих в слове */
.gray {
    background-color: #787c7e;
}

/* Жёлтый цвет для букв, находящихся не на своей позиции */
.yellow {
    background-color: #c9b458;
}

/* Зеленый цвет для правильно угаданных букв */
.green {
    background-color: #6aaa64;
}

    const WORD_LENGTH = 5;
const MAX_GUESSES = 6;
let currentRow = 0;
let currentCol = 0;
let answer = '';
let guesses = []; // Хранит уже сделанные ходы
let keyboardColors = {}; // Объект для хранения цветов кнопок клавиатуры: {'А': 'green', 'Б': 'yellow', ...}

const submitButton = document.getElementById('submit-btn');
const gridElement = document.querySelector('#grid');
const messageSpan = document.querySelector('#message');
const startButton = document.getElementById('start-game-btn');

// --- ЭЛЕМЕНТЫ DOM ДЛЯ НАСТРОЕК ---
const settingsBtn = document.getElementById('settings-btn');
const settingsDialog = document.getElementById('settings-dialog');
const modalOverlay = document.getElementById('modal-overlay');
const saveSettingsBtn = document.getElementById('save');
const cancelSettingsBtn = document.getElementById('cancel');
let isGameOver = true;
// --- ОБРАБОТЧИКИ НАСТРОЕК ---
settingsBtn.addEventListener('click', () => {
    settingsDialog.style.display = 'block';
    modalOverlay.style.display = 'block';
    // Устанавливаем текущую тему в радио-кнопки
    const currentTheme = document.body.classList.contains('light-mode') ? 'light' : 'dark';
    document.querySelector(`input[name="theme"][value="${currentTheme}"]`).checked = true;
});

cancelSettingsBtn.addEventListener('click', () => {
    settingsDialog.style.display = 'none';
    modalOverlay.style.display = 'none';
});

saveSettingsBtn.addEventListener('click', () => {
    saveSettings();
    settingsDialog.style.display = 'none';
    modalOverlay.style.display = 'none';
});

// --- ФУНКЦИЯ СОХРАНЕНИЯ НАСТРОЕК ---
function saveSettings() {
    const selectedTheme = document.querySelector('input[name="theme"]:checked').value;

    if (selectedTheme === "light") {
        document.body.classList.add("light-mode");
        document.body.classList.remove("dark-mode");
    } else {
        document.body.classList.add("dark-mode");
        document.body.classList.remove("light-mode");
    }
    localStorage.setItem("wordle_theme", selectedTheme);
}

// --- ИНИЦИАЛИЗАЦИЯ ПРИ ЗАГРУЗКЕ СТРАНИЦЫ ---
document.addEventListener('DOMContentLoaded', function() {
    // Загрузка темы из LocalStorage
    const savedTheme = localStorage.getItem("wordle_theme");
    if (savedTheme) {
        if (savedTheme === "light") {
            document.body.classList.add("light-mode");
            document.body.classList.remove("dark-mode");
        } else {
            document.body.classList.add("dark-mode");
            document.body.classList.remove("light-mode");
        }
    } else {
        // По умолчанию темная тема, если ничего не сохранено
        document.body.classList.add("dark-mode");
    }

    // Подключаем обработчики к клавиатуре ОДИН РАЗ
    document.querySelectorAll("#keyboard button").forEach(button => {
        button.addEventListener("click", handleKeyboardClick);
    });

    // Первичный рендер пустой игры
    resetGameState();
    renderEntireGame();
    document.addEventListener('keydown', handlePhysicalKeyboard); // Добавляем обработчик физической клавиатуры
});

function handlePhysicalKeyboard(event) {
    // Игнорируем нажатия, если модальное окно настроек открыто
    if (settingsDialog.style.display === 'block') {
        return;
    }

    const key = event.key.toUpperCase(); // Получаем нажатую клавишу

    // Проверяем, является ли клавиша буквой (А-Я)
    const isLetter = key.length === 1 && key.match(/[А-Я]/);

    if (isLetter) {
        const virtualButton = document.querySelector(`button[data-key="${key}"]`);
        if (virtualButton) {
            virtualButton.click();
        }
    } else if (key === 'BACKSPACE') {
        const deleteButton = document.querySelector('button[data-key="DELETE"]');
        deleteButton?.click();
    } else if (key === 'ENTER') {
        const enterButton = document.querySelector('button[data-key="ENTER"]');
        enterButton?.click();
    }
}

// --- ФУНКЦИЯ ПОДСЧЕТА ЦВЕТОВ (логика Wordle) ---
function calculateTileColors(guess) {
    const result = [];
    const answerLetterCount = {};

    // Считаем буквы в ответе
    answer.split('').forEach(char => {
        answerLetterCount[char] = (answerLetterCount[char] || 0) + 1;
    });

    // Фаза 1: Зеленые (точные совпадения)
    guess.split('').forEach((char, i) => {
        if (char === answer[i]) {
            result.push('green');
            answerLetterCount[char]--; // Уменьшаем счетчик буквы
        } else {
            result.push(null); // Пока не определен цвет
        }
    });

    // Фаза 2: Желтые (буква есть, но не на месте) и Серые (буквы нет)
    guess.split('').forEach((char, i) => {
        if (result[i]) return; // Пропускаем, если уже зеленый

        if (answerLetterCount[char] > 0) {
            result[i] = 'yellow';
            answerLetterCount[char]--; // Уменьшаем счетчик буквы
        } else {
            result[i] = 'gray'; // Буквы нет в слове
        }
    });

    return result;
}
// --- ФУНКЦИЯ ОБНОВЛЕНИЯ ЦВЕТОВ КЛАВИАТУРЫ ---
function updateKeyboardColors(guess, colors) {
    guess.split('').forEach((letter, index) => {
        const color = colors[index];
        const existingColor = keyboardColors[letter];

        // Логика: зеленый > желтый > серый. Если буква уже окрашена в более "сильный" цвет, не меняем.
        if (!existingColor ||
            (existingColor === 'yellow' && color === 'green') ||
            (existingColor === 'gray' && (color === 'yellow' || color === 'green')) ||
            (existingColor === null && (color === 'yellow' || color === 'green' || color === 'gray'))) {
            keyboardColors[letter] = color;
        }
    });

    // Применяем цвета ко всем кнопкам клавиатуры
    document.querySelectorAll('#keyboard button[data-key]').forEach(button => {
        const key = button.dataset.key;
        const color = keyboardColors[key];

        // Сначала удаляем все возможные цвета
        button.classList.remove('green', 'yellow', 'gray');

        // Затем добавляем новый цвет, если он определен
        if (color) {
            button.classList.add(color);
        }
    });
}

// --- ОБРАБОТЧИК КЛАВИАТУРЫ ---
function handleKeyboardClick(e) {
    if (isGameOver) return;

    const key = e.target.dataset.key;

    if (key === "DELETE") {
        if (currentCol > 0) {
            currentRow[currentCol - 1] = ''; // Очищаем предыдущую ячейку
            currentCol--; // Перемещаемся на предыдущую позицию
        }
    } else if (key === "ENTER") {
        submitCurrentGuess();
    } else if (key && currentCol < WORD_LENGTH) {
        // Если клавиша — буква и мы не вышли за пределы поля
        currentRow[currentCol] = key;
        currentCol++; // Переходим к следующей позиции
    }
    renderEntireGame(); // Перерисовываем поле
}

// --- ЛОГИКА ОТПРАВКИ ХОДА ---
function submitCurrentGuess() {
    const guessWord = currentRow.join('').toUpperCase();

    if (!guessWord || guessWord.length !== WORD_LENGTH) {
        messageSpan.textContent = 'Слово должно быть из 5 букв!';
        return;
    }
    if (!words.includes(guessWord)) {
        messageSpan.textContent = 'Такого слова нет в словаре!';
        return;
    }

    messageSpan.textContent = ''; // Очищаем сообщение об ошибке

    // --- Анимация плиток ---
    const gridContainer = document.querySelector('#grid');
    gridContainer.classList.add('animate-tiles');
    setTimeout(() => {
        gridContainer.classList.remove('animate-tiles');
    }, 500);

    const colors = calculateTileColors(guessWord); // Получаем цвета для текущего слова
    updateKeyboardColors(guessWord, colors); // Обновляем цвета кнопок клавиатуры

    guesses.push(guessWord); // Добавляем ход в историю

    if (guessWord === answer) {
        endGame(true);
    } else if (guesses.length >= MAX_GUESSES) {
        endGame(false);
    } else {
        // Переходим к следующему ряду
        currentRow = new Array(WORD_LENGTH).fill('');
        currentCol = 0;
        renderEntireGame();
    }
}

// --- СТАРТ НОВОЙ ИГРЫ ---
function setupGame() {
    isGameOver = false;
    startButton.style.visibility = 'hidden';
    answer = pickRandomWord(words);
    keyboardColors = {}; // Сбрасываем цвета клавиатуры при старте новой игры

    // Сброс состояния для новой игры
    guesses = [];
    currentRow = new Array(WORD_LENGTH).fill('');
    currentCol = 0;
    messageSpan.textContent = '';
    document.addEventListener('keydown', handlePhysicalKeyboard);
    renderEntireGame(); // Отрисовываем пустое поле
}

// --- КОНЕЦ ИГРЫ ---
function endGame(won) {
    isGameOver = true;
        keyboardColors = {}; // Очищаем объект, где хранятся цвета букв

    // Находим все кнопки клавиатуры и убираем с них классы цветов
    document.querySelectorAll('#keyboard button[data-key]').forEach(button => {
        button.classList.remove('green', 'yellow', 'gray');
    });
    startButton.style.visibility = 'visible';

    if (won) {
        messageSpan.textContent = 'Поздравляю! Вы выиграли!';
    } else {
        messageSpan.textContent = `Игра закончена. Ответ был "${answer}".`;
    }
    // Снимаем обработчик физической клавиатуры, чтобы избежать ввода после проигрыша/выигрыша
    document.removeEventListener('keydown', handlePhysicalKeyboard);
}

// --- СБРОС СОСТОЯНИЯ ИГРЫ ---
function resetGameState() {
    answer = '';
    guesses = [];
    currentRow = new Array(WORD_LENGTH).fill('');
    currentCol = 0;
    keyboardColors = {}; // Сбрасываем цвета клавиатуры
}

// --- ГЛАВНАЯ ФУНКЦИЯ ОТРИСОВКИ ---
function renderEntireGame() {
    gridElement.innerHTML = ''; // Полная очистка перед перерисовкой

    // 1. Отрисовываем завершенные ходы (раскрашиваем плитки)
    guesses.forEach((guess, rowIndex) => {
        const rowDiv = document.createElement('div');
        rowDiv.classList.add('grid-row');

        const colors = calculateTileColors(guess);

        guess.split('').forEach((letter, colIndex) => {
            const tile = document.createElement('div');
            tile.classList.add('tile');

            if (letter) {
                tile.textContent = letter;
                tile.classList.add(colors[colIndex]); // Добавляем цвет: green/yellow/gray
            }
            rowDiv.appendChild(tile);
        });
        gridElement.appendChild(rowDiv);
    });

    // 2. Отрисовываем текущий ряд (где идет ввод)
    const rowDiv = document.createElement('div');
    rowDiv.classList.add('grid-row');

    for (let i = 0; i < WORD_LENGTH; i++) {
        const tile = document.createElement('div');
        tile.classList.add('tile');

        if (i < currentCol && !isGameOver) { // Заполненные плитки текущего хода
            tile.textContent = currentRow[i];
            tile.classList.add('has-text');
        } else if (i === currentCol && !isGameOver) { // Активная плитка
            tile.textContent = currentRow[i];
            tile.classList.add('active');
            if (currentRow[i]) {
                tile.classList.add('has-text');
            }
        } else if (currentRow[i]) { // Плитки в пустых рядах, если они есть (маловероятно, но для полноты)
            tile.textContent = currentRow[i];
            tile.classList.add('has-text');
        }
        rowDiv.appendChild(tile);
    }
    gridElement.appendChild(rowDiv);

    // Обновляем цвета клавиатуры ПОСЛЕ отрисовки плиток, чтобы гарантировать актуальность
    // Это нужно, чтобы цвета клавиатуры отражали состояние всех предыдущих ходов
    Object.keys(keyboardColors).forEach(key => {
        const button = document.querySelector(`#keyboard button[data-key="${key}"]`);
        if (button) {
            button.classList.remove('green', 'yellow', 'gray');
            if (keyboardColors[key]) {
                button.classList.add(keyboardColors[key]);
            }
        }
    });
}

// --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---
function pickRandomWord(wordList) {
    return wordList[Math.floor(Math.random() * wordList.length)];
}

// --- ПОДКЛЮЧЕНИЕ КНОПКИ СТАРТА ---
startButton.addEventListener('click', setupGame);
</script>
